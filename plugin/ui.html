<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML to Figma - Import Web Pages and Code</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
      --bg-0:#070912;
      --bg-1:#0a0e1b;
      --glass:rgba(23,29,49,.72);
      --glass-strong:rgba(29,37,62,.88);
      --line:rgba(194,205,255,.14);
      --line-strong:rgba(194,205,255,.27);
      --text:#f7f8ff;
      --muted:#aeb8d3;
      --soft:#7f8aa8;
      --violet:#8b72ff;
      --blue:#5687ff;
      --cyan:#68d7ff;
      --danger:#ff7f9f;
      --success:#68e6ad;
    }
    * { box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      position:relative;
      margin:0;
      padding:16px;
      overflow:hidden;
      color:var(--text);
      background:
        radial-gradient(360px 260px at 92% -5%, rgba(68,117,255,.22), transparent 68%),
        radial-gradient(320px 280px at -8% 96%, rgba(139,89,255,.18), transparent 70%),
        linear-gradient(155deg,var(--bg-1),var(--bg-0));
      font-size:12px;
      line-height:1.4;
    }
    body::before {
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.25;
      background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:22px 22px;
      mask-image:linear-gradient(to bottom,black,transparent 88%);
    }
    button,input { font:inherit; }
    button { -webkit-tap-highlight-color:transparent; }
    #app { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; }
    .brand { display:flex; align-items:center; gap:11px; min-height:48px; }
    .brand-icon {
      width:42px; height:42px; flex:none; display:grid; place-items:center;
      padding:3px;
      border:1px solid rgba(179,194,255,.2); border-radius:13px;
      background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(240,243,255,.92));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 10px 28px rgba(0,0,0,.26);
      overflow:hidden;
    }
    .brand-icon img {
      width:100%; height:100%; display:block; object-fit:contain;
      border-radius:10px;
      background:#fff;
    }
    .eyebrow { color:#94a4cf; font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    h1 { margin:3px 0 0; font-size:17px; line-height:1.15; letter-spacing:-.02em; }
    p { margin:0; }
    .muted { color:var(--muted); }
    .glass {
      border:1px solid var(--line);
      background:linear-gradient(145deg,rgba(35,43,70,.76),rgba(19,24,42,.66));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.055),0 16px 38px rgba(0,0,0,.18);
      backdrop-filter:blur(18px) saturate(125%);
      -webkit-backdrop-filter:blur(18px) saturate(125%);
    }

    .source-tabs {
      display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:11px; padding:4px;
      border:1px solid rgba(194,205,255,.12); border-radius:12px; background:rgba(5,8,17,.36);
    }
    .tab {
      height:32px; border:1px solid transparent; border-radius:8px; color:#94a1c2;
      background:transparent; font-weight:700; cursor:pointer;
    }
    .tab:hover { color:#dce2f5; background:rgba(46,55,87,.42); }
    .tab.active {
      color:#fff; border-color:rgba(211,219,255,.16);
      background:linear-gradient(135deg,rgba(118,99,237,.78),rgba(76,112,245,.76));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 7px 18px rgba(46,63,178,.18);
    }
    .url-card { margin-top:10px; padding:13px; border-radius:16px; }
    .field { display:block; margin-top:9px; }
    .field:first-child { margin-top:0; }
    .field-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; color:#dce2f4; font-size:10px; font-weight:700; }
    .field-hint { color:#71809f; font-size:9px; font-weight:500; }
    .text-input {
      width:100%; height:36px; padding:0 11px; border:1px solid rgba(190,203,255,.15); border-radius:9px;
      outline:none; color:#f6f8ff; background:rgba(5,8,17,.38); box-shadow:inset 0 1px 0 rgba(255,255,255,.025);
    }
    .text-input::placeholder { color:#64718f; }
    .text-input:focus { border-color:rgba(118,137,255,.68); box-shadow:0 0 0 3px rgba(96,111,255,.11); }
    .server-row { display:grid; grid-template-columns:1fr 74px; gap:7px; }
    .check-button {
      height:36px; border:1px solid rgba(190,203,255,.16); border-radius:9px; color:#dce2f4;
      background:rgba(35,43,69,.76); font-weight:700; cursor:pointer;
    }
    .check-button:hover { background:rgba(49,59,92,.88); }
    .helper-state { min-height:16px; margin-top:6px; color:#7f8dab; font-size:9.5px; }
    [hidden] { display:none!important; }
    .upload-card { margin-top:10px; padding:8px; border-radius:16px; }
    .dropzone {
      position:relative; display:flex; min-height:144px; padding:16px 14px;
      border:1px dashed rgba(181,195,255,.37); border-radius:12px;
      text-align:center; cursor:pointer; overflow:hidden;
      background:
        radial-gradient(190px 80px at 50% 0%,rgba(123,113,255,.17),transparent 75%),
        rgba(6,9,18,.28);
      flex-direction:column; justify-content:center; align-items:center;
      transition:border-color .16s ease,background .16s ease,transform .16s ease;
    }
    .dropzone:hover { border-color:rgba(173,188,255,.62); background-color:rgba(18,24,43,.54); }
    .dropzone:active { transform:scale(.995); }
    .dropzone.drag { outline:2px solid rgba(118,137,255,.72); outline-offset:2px; }
    .upload-icon {
      width:38px;height:38px;display:grid;place-items:center;margin-bottom:8px;
      border:1px solid rgba(185,198,255,.2);border-radius:12px;
      background:rgba(143,126,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
      pointer-events:none;
    }
    .upload-icon svg { width:20px;height:20px;stroke:#dfe5ff; }
    .dropzone strong { display:block; margin-bottom:3px; font-size:13px; letter-spacing:-.01em; }
    .dropzone .muted { max-width:355px; font-size:10.5px; color:#99a5c4; }
    .drop-actions { display:flex; justify-content:center; margin-top:11px; }
    .drop-button {
      position:relative;height:31px;padding:0 15px;border:1px solid rgba(210,217,255,.2);border-radius:8px;
      color:#fff;background:linear-gradient(135deg,#7664ed,#557cff);font-weight:700;cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.21),0 8px 20px rgba(65,82,214,.27);
      transition:filter .15s ease,transform .15s ease;
    }
    .drop-button:hover { filter:brightness(1.08); }
    .drop-button:active { transform:translateY(1px); }
    input[type=file] { display:none; }
    .files {
      min-height:21px; max-height:36px; margin:7px 5px 0; overflow:auto;
      white-space:pre-wrap; overflow-wrap:anywhere; color:#8f9bbb; font-size:10px;
      scrollbar-width:thin;
    }
    .viewport-card { margin-top:11px; padding:12px; border-radius:14px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; }
    .section-head strong { font-size:11px; }
    .section-note { color:#71809f; font-size:9px; }
    .presets { display:grid; grid-template-columns:1fr 1fr; gap:7px 8px; margin-top:9px; }
    .preset {
      position:relative; display:flex; align-items:center; gap:8px; min-height:30px; padding:0 9px;
      border:1px solid rgba(191,204,255,.09); border-radius:9px; color:#d9def0;
      background:rgba(6,9,18,.21); font-weight:550; cursor:pointer;
      transition:border-color .15s ease,background .15s ease;
    }
    .preset:hover { border-color:rgba(178,192,255,.22); background:rgba(39,47,77,.38); }
    .preset:last-child { grid-column:1 / -1; width:calc(50% - 4px); }
    .preset input {
      appearance:none; width:14px; height:14px; margin:0; flex:none; border:1px solid rgba(194,205,255,.38);
      border-radius:4px; background:rgba(2,4,10,.35); display:grid; place-items:center; cursor:pointer;
    }
    .preset input::after { content:""; width:7px; height:4px; border-left:1.8px solid white; border-bottom:1.8px solid white; transform:rotate(-45deg) scale(0); margin-top:-1px; transition:transform .12s ease; }
    .preset input:checked { border-color:transparent; background:linear-gradient(135deg,var(--violet),var(--blue)); box-shadow:0 0 0 3px rgba(116,112,255,.1); }
    .preset input:checked::after { transform:rotate(-45deg) scale(1); }
    .actions { display:flex; gap:8px; margin-top:11px; }
    .actions button { height:37px; padding:0 15px; border-radius:9px; font-weight:700; cursor:pointer; }
    button.primary {
      flex:1; border:1px solid rgba(219,225,255,.18); color:#fff;
      background:linear-gradient(100deg,#755fe8 0%,#596fff 52%,#467fff 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 10px 26px rgba(61,81,216,.25);
    }
    button.primary:hover { filter:brightness(1.07); }
    button.secondary { min-width:82px; border:1px solid rgba(192,204,255,.14); color:#d8deef; background:rgba(28,34,55,.72); }
    button.secondary:hover { background:rgba(43,51,80,.82); }
    button:disabled { cursor:default; opacity:.5; filter:none!important; }
    .status {
      position:absolute; left:0; right:0; bottom:48px; display:none; padding:10px 11px;
      border:1px solid rgba(190,203,255,.16); border-radius:11px;
      background:rgba(10,14,26,.94); box-shadow:0 14px 34px rgba(0,0,0,.38); backdrop-filter:blur(16px);
    }
    .status.visible { display:block; }
    .bar { height:4px; overflow:hidden; border-radius:99px; background:rgba(190,203,255,.13); }
    .bar > div { width:0%; height:100%; border-radius:inherit; background:linear-gradient(90deg,var(--violet),var(--cyan)); transition:width .15s ease; }
    .status-text { margin-top:6px; max-height:42px; overflow:auto; white-space:pre-wrap; color:#aab4cf; font-size:10px; }
    .error { color:var(--danger)!important; }
    .success { color:var(--success)!important; }
    .hidden-compat { display:none!important; }
  </style>
</head>

        <span class="muted">HTML, CSS, JavaScript, fonts and images can be selected together</span>
        <div class="drop-actions"><button id="chooseFiles" class="drop-button" type="button">Choose file</button></div>
      </div>
      <input id="fileInput" type="file" multiple accept=".html,.htm,.css,.js,.mjs,.json,.woff,.woff2,.ttf,.otf,.png,.jpg,.jpeg,.gif,.webp,.svg,image/*,text/html,text/css,text/javascript,application/javascript,application/json,font/*" />
      <div id="files" class="files">No files selected yet.</div>
    </section>

    <section class="viewport-card glass">
      <div class="section-head"><strong>Viewport sizes</strong><span class="section-note">Select one or more</span></div>
      <div class="presets">
        <label class="preset"><input type="checkbox" name="preset" value="1920" data-label="Desktop 1920" checked> Desktop — 1920</label>
        <label class="preset"><input type="checkbox" name="preset" value="1440" data-label="Laptop 1440"> Laptop — 1440</label>
        <label class="preset"><input type="checkbox" name="preset" value="1024" data-label="Tablet 1024"> Tablet — 1024</label>
        <label class="preset"><input type="checkbox" name="preset" value="768" data-label="Tablet 768"> Tablet — 768</label>
        <label class="preset"><input type="checkbox" name="preset" value="390" data-label="Mobile 390"> Mobile — 390</label>
      </div>
    </section>

    <div class="actions">
      <button id="importButton" class="primary">Import HTML</button>
      <button id="cancelButton" class="secondary">Close</button>
    </div>

    <div id="status" class="status">
      <div class="bar"><div id="bar"></div></div>
      <div id="statusText" class="status-text"></div>
    </div>
  </main>

  <div class="hidden-compat" aria-hidden="true">
    <select id="mode"><option value="editable" selected>Editable layers</option></select>
    <div id="nodeLimitField"><input id="maxNodes" type="number" value="100000" /></div>
    <label id="cleanTreeRow"><input id="cleanTree" type="checkbox" /></label>
    <div id="sourceNote"></div>
  </div>

  <script>
    const app = document.getElementById('app');
    const fileInput = document.getElementById('fileInput');
    const chooseFilesButton = document.getElementById('chooseFiles');
    const dropzone = document.getElementById('dropzone');
    const filesView = document.getElementById('files');
    const siteUrlInput = document.getElementById('siteUrl');
    const serverUrlInput = document.getElementById('serverUrl');
    const serverKeyInput = document.getElementById('serverKey');
    const checkHelperButton = document.getElementById('checkHelper');
    const helperState = document.getElementById('helperState');
    const importButton = document.getElementById('importButton');
    const cancelButton = document.getElementById('cancelButton');
    const modeSelect = document.getElementById('mode');
    const nodeLimitField = document.getElementById('nodeLimitField');
    const cleanTreeRow = document.getElementById('cleanTreeRow');
    const cleanTreeInput = document.getElementById('cleanTree');
    const maxNodesInput = document.getElementById('maxNodes');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const bar = document.getElementById('bar');
    const localPanel = document.getElementById('localPanel');
    const urlPanel = document.getElementById('urlPanel');
    const sourceNote = document.getElementById('sourceNote');

    let selectedFiles = [];
    let sourceMode = 'url';
    let activeRenderFrame = null;
    let figmaWaiter = null;
    let currentWarnings = [];
    const droppedFilePaths = new WeakMap();



    document.querySelectorAll('.tab').forEach((button) => button.addEventListener('click', () => setSourceMode(button.dataset.source)));
    fileInput.addEventListener('change', () => setFiles(Array.from(fileInput.files || [])));
    chooseFilesButton.addEventListener('click', (event) => { event.stopPropagation(); fileInput.click(); });
    dropzone.addEventListener('click', (event) => { if (!event.target.closest('button')) fileInput.click(); });
    dropzone.addEventListener('keydown', (event) => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); fileInput.click(); } });
    checkHelperButton.addEventListener('click', checkHelper);
    serverUrlInput.addEventListener('input', () => {
      try { localStorage.setItem('html-to-figma-server-url', serverUrlInput.value.trim()); } catch (_error) {}
      helperState.textContent = 'Press Check to test the server connection.';
      helperState.className = 'helper-state muted';
    });
    serverKeyInput.addEventListener('input', () => {
      try { localStorage.setItem('html-to-figma-server-key', serverKeyInput.value.trim()); } catch (_error) {}
      helperState.textContent = 'Press Check to test the server connection.';
      helperState.className = 'helper-state muted';
    });
    importButton.addEventListener('click', runImport);
    cancelButton.addEventListener('click', () => parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*'));

    for (const eventName of ['dragenter','dragover']) dropzone.addEventListener(eventName, (event) => { event.preventDefault(); dropzone.classList.add('drag'); });
    for (const eventName of ['dragleave','drop']) dropzone.addEventListener(eventName, (event) => { event.preventDefault(); dropzone.classList.remove('drag'); });
    dropzone.addEventListener('drop', async (event) => setFiles(await filesFromDataTransfer(event.dataTransfer)));

    function setSourceMode(mode) {
      sourceMode = mode === 'local' ? 'local' : 'url';
      document.querySelectorAll('.tab').forEach((button) => button.classList.toggle('active', button.dataset.source === sourceMode));
      localPanel.hidden = sourceMode !== 'local';
      urlPanel.hidden = sourceMode !== 'url';
      importButton.textContent = sourceMode === 'url' ? 'Import website' : 'Import HTML';
      sourceNote.textContent = sourceMode === 'url'
        ? 'The Render server opens the page in Chromium before Figma creates editable layers.'
        : 'Local HTML and selected assets are rendered before import.';
    }

    function getServerOrigin() {
      let value = serverUrlInput.value.trim();
      if (!value) throw new Error('Paste your Render server address first.');
      if (!/^https?:\/\//i.test(value)) value = `https://${value}`;
      const parsed = new URL(value);
      if (!/^https?:$/i.test(parsed.protocol)) throw new Error('The server address must start with https://');
      return parsed.origin;
    }

    function getServerKey() {
      const value = serverKeyInput.value.trim();
      if (!value) throw new Error('Paste the API_KEY from Render first.');
      return value;
    }

    function updateModeUi() {
      // Reserved for future import-mode-specific controls.
    }

    function readDirectoryEntries(reader) {
      return new Promise((resolve, reject) => {
        const all = [];
        const next = () => reader.readEntries((entries) => {
          if (!entries.length) { resolve(all); return; }
          all.push(...entries);
          next();
        }, reject);
        next();
      });
    }

    async function collectEntryFiles(entry, prefix = '') {
      if (!entry) return [];
      if (entry.isFile) {
        const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
        const relativePath = `${prefix}${entry.name}`;
        droppedFilePaths.set(file, relativePath);
        return [file];
      }
      if (entry.isDirectory) {
        const entries = await readDirectoryEntries(entry.createReader());
        const nested = [];
        for (const child of entries) nested.push(...await collectEntryFiles(child, `${prefix}${entry.name}/`));
        return nested;
      }
      return [];
    }

    async function filesFromDataTransfer(dataTransfer) {
      if (!dataTransfer) return [];
      const entries = Array.from(dataTransfer.items || [])
        .map((item) => item.webkitGetAsEntry?.())
        .filter(Boolean);
      if (!entries.length) return Array.from(dataTransfer.files || []);
      const files = [];
      for (const entry of entries) files.push(...await collectEntryFiles(entry));
      return files;
    }

    function setFiles(files) {
      selectedFiles = files;
      const html = files.find((file) => /\.html?$/i.test(file.name));
      filesView.textContent = files.length
        ? files.map((file) => `${file === html ? '●' : '○'} ${file.webkitRelativePath || droppedFilePaths.get(file) || file.name}`).join('\n')
        : 'No files selected yet.';
    }

    function setStatus(text, kind = 'normal', percent = null) {
      status.classList.add('visible');
      statusText.textContent = text;
      statusText.className = `status-text ${kind === 'error' ? 'error' : kind === 'success' ? 'success' : 'muted'}`;
      if (percent !== null) bar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
    }

    function setBusy(busy) {
      importButton.disabled = busy;
      fileInput.disabled = busy;
      chooseFilesButton.disabled = busy;
      checkHelperButton.disabled = busy;
      serverUrlInput.disabled = busy;
      serverKeyInput.disabled = busy;
      document.querySelectorAll('input[name="preset"], #siteUrl, #mode, #maxNodes, #cleanTree').forEach((element) => element.disabled = busy);
    }
    function normalizePath(value) {
      return decodeURIComponent(String(value || ''))
        .replace(/[?#].*$/, '')
        .replace(/^\.\//, '')
        .replace(/\\/g, '/')
        .toLowerCase();
    }

    function basename(value) {
      const normalized = normalizePath(value);
      return normalized.slice(normalized.lastIndexOf('/') + 1);
    }

    function readAsText(file) {
      return file.text();
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error || new Error(`Could not read ${file.name}`));
        reader.readAsDataURL(file);
      });
    }

    async function prepareFiles(files) {
      const records = [];
      for (const file of files) {
        const path = normalizePath(file.webkitRelativePath || droppedFilePaths.get(file) || file.name);
        const record = { file, path, name: normalizePath(file.name), text: null, dataUrl: null };
        if (/\.(html?|css|svg|m?js)$/i.test(file.name)) record.text = await readAsText(file);
        if (!/\.(html?|css)$/i.test(file.name)) record.dataUrl = await readAsDataUrl(file);
        records.push(record);
      }

      const byPath = new Map();
      for (const record of records) {
        byPath.set(record.path, record);
        if (!byPath.has(record.name)) byPath.set(record.name, record);
        const base = basename(record.path);
        if (!byPath.has(base)) byPath.set(base, record);
      }
      return { records, byPath };
    }

    function dirnamePath(value) {
      const normalized = normalizePath(value);
      const index = normalized.lastIndexOf('/');
      return index >= 0 ? normalized.slice(0, index + 1) : '';
    }

    function normalizeJoinedPath(basePath, reference) {
      const raw = normalizePath(`${dirnamePath(basePath)}${reference}`);
      const parts = [];
      for (const part of raw.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') parts.pop();
        else parts.push(part);
      }
      return parts.join('/');
    }

    function findRecord(byPath, reference, basePath = '') {
      if (!reference || /^(data:|blob:|https?:|file:|\/\/|#)/i.test(reference)) return null;
      const direct = normalizePath(reference).replace(/^\//, '');
      const joined = normalizeJoinedPath(basePath, reference);
      const candidates = [joined, direct, basename(reference)];
      for (const candidate of [...candidates]) {
        if (!candidate) continue;
        if (!/\.[a-z0-9]+$/i.test(candidate)) {
          candidates.push(`${candidate}.js`, `${candidate}.mjs`, `${candidate}.css`, `${candidate}/index.js`, `${candidate}/index.mjs`);
        }
      }
      for (const candidate of candidates) {
        const record = byPath.get(candidate);
        if (record) return record;
      }
      return null;
    }

    function textDataUrl(mime, value) {
      return `data:${mime};charset=utf-8,${encodeURIComponent(value)}`;
    }

    function moduleDataUrl(record, byPath, cache = new Map(), stack = new Set()) {
      if (!record?.text) return record?.dataUrl || null;
      if (cache.has(record.path)) return cache.get(record.path);
      if (stack.has(record.path)) return record.dataUrl || textDataUrl('text/javascript', record.text);
      stack.add(record.path);
      let source = record.text;
      const rewriteSpecifier = (specifier) => {
        const dependency = findRecord(byPath, specifier, record.path);
        if (!dependency || !/\.m?js$/i.test(dependency.file.name)) return specifier;
        return moduleDataUrl(dependency, byPath, cache, stack) || specifier;
      };
      source = source.replace(/(\b(?:import|export)\s+(?:[^'";]*?\s+from\s*)?)(['"])([^'"]+)\2/g, (_full, prefix, quote, specifier) => `${prefix}${quote}${rewriteSpecifier(specifier)}${quote}`);
      source = source.replace(/\bimport\s*\(\s*(['"])([^'"]+)\1\s*\)/g, (_full, quote, specifier) => `import(${quote}${rewriteSpecifier(specifier)}${quote})`);
      source = source.replace(/new\s+URL\(\s*(['"])([^'"]+)\1\s*,\s*import\.meta\.url\s*\)/g, (full, quote, specifier) => {
        const asset = findRecord(byPath, specifier, record.path);
        return asset?.dataUrl ? `new URL(${quote}${asset.dataUrl}${quote})` : full;
      });
      stack.delete(record.path);
      const url = textDataUrl('text/javascript', source);
      cache.set(record.path, url);
      return url;
    }

    function rewriteCssUrls(css, byPath, basePath = '') {
      return String(css || '').replace(/url\(\s*(['"]?)(.*?)\1\s*\)/gi, (full, _quote, rawUrl) => {
        const url = String(rawUrl || '').trim();
        if (!url || /^(data:|blob:|https?:|\/\/|#)/i.test(url)) return full;
        const record = findRecord(byPath, url, basePath);
        return record?.dataUrl ? `url("${record.dataUrl}")` : full;
      });
    }

    function inlineCssImports(css, byPath, basePath = '', seen = new Set()) {
      const current = normalizePath(basePath);
      if (seen.has(current)) return rewriteCssUrls(css, byPath, basePath);
      const nextSeen = new Set(seen);
      if (current) nextSeen.add(current);
      const imported = String(css || '').replace(/@import\s+(?:url\()?\s*(['"])([^'"]+)\1\s*\)?\s*([^;]*);/gi, (full, _quote, reference, media) => {
        const record = findRecord(byPath, reference, basePath);
        if (!record?.text || !/\.css$/i.test(record.file.name)) return full;
        const nested = inlineCssImports(record.text, byPath, record.path, nextSeen);
        const condition = String(media || '').trim();
        return condition ? `@media ${condition}{${nested}}` : nested;
      });
      return rewriteCssUrls(imported, byPath, basePath);
    }

    function sanitizeAndInline(htmlText, byPath, records, htmlPath = '') {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const missingResources = new Set();
      const moduleCache = new Map();
      doc.querySelectorAll('iframe, object, embed, base').forEach((node) => node.remove());
      doc.querySelectorAll('meta[http-equiv="refresh" i], meta[http-equiv="content-security-policy" i]').forEach((node) => node.remove());

      // Make selected local JSON, modules, fonts and images available to scripts
      // that load them with fetch() or XMLHttpRequest using relative paths.
      const runtimeAssets = {};
      for (const record of records) {
        const url = record.dataUrl || (record.text != null ? textDataUrl('text/plain', record.text) : null);
        if (!url) continue;
        for (const key of [record.path, record.name, basename(record.path)]) {
          if (key && !runtimeAssets[key]) runtimeAssets[key] = url;
        }
      }
      const runtime = doc.createElement('script');
      runtime.setAttribute('data-html-to-figma-runtime', '');
      runtime.textContent = `(() => {
        const assets = ${JSON.stringify(runtimeAssets)};
        const normalize = value => {
          try { value = decodeURIComponent(String(value || '')); } catch (_error) { value = String(value || ''); }
          return value.replace(/[?#].*$/, '').replace(/^\\.\\//, '').replace(/^\\//, '').replace(/\\\\/g, '/').toLowerCase();
        };
        const resolve = value => {
          const normalized = normalize(value);
          const base = normalized.slice(normalized.lastIndexOf('/') + 1);
          return assets[normalized] || assets[base] || null;
        };
        const nativeFetch = window.fetch?.bind(window);
        if (nativeFetch) window.fetch = (input, init) => {
          const raw = typeof input === 'string' || input instanceof URL ? String(input) : input?.url;
          const mapped = resolve(raw);
          return nativeFetch(mapped || input, init);
        };
        const NativeXHR = window.XMLHttpRequest;
        if (NativeXHR) {
          const nativeOpen = NativeXHR.prototype.open;
          NativeXHR.prototype.open = function(method, url, ...rest) {
            return nativeOpen.call(this, method, resolve(url) || url, ...rest);
          };
        }
      })();`;
      doc.head.prepend(runtime);

      // Keep scripts so framework-driven sections can materialize before the
      // DOM is measured. Local ES modules have their relative imports rewritten
      // to selected files, including modules nested in project subfolders.
      for (const script of Array.from(doc.querySelectorAll('script[src]'))) {
        const src = script.getAttribute('src') || '';
        const record = findRecord(byPath, src, htmlPath);
        if (record?.dataUrl || record?.text) {
          const isModule = String(script.getAttribute('type') || '').toLowerCase() === 'module' || /\.mjs$/i.test(record.file.name);
          const localUrl = isModule ? moduleDataUrl(record, byPath, moduleCache) : record.dataUrl;
          if (localUrl) script.setAttribute('src', localUrl);
          script.removeAttribute('integrity');
          script.removeAttribute('crossorigin');
          script.setAttribute('data-local-source', record.file.name);
        } else if (!/^(https?:)?\/\//i.test(src) && !/^(data:|blob:)/i.test(src)) {
          missingResources.add(src);
          script.remove();
        }
      }
      for (const script of Array.from(doc.querySelectorAll('script[type="module"]:not([src])'))) {
        const source = script.textContent || '';
        if (!/\b(?:import|export)\b/.test(source)) continue;
        const virtualRecord = { path:normalizePath(htmlPath || 'inline-entry.js'), text:source, dataUrl:null, file:{ name:'inline-entry.js' } };
        const url = moduleDataUrl(virtualRecord, byPath, moduleCache);
        if (url) { script.textContent = ''; script.setAttribute('src', url); }
      }

      for (const link of Array.from(doc.querySelectorAll('link[rel~="stylesheet" i]'))) {
        const href = link.getAttribute('href') || '';
        const record = findRecord(byPath, href, htmlPath);
        if (record?.text != null) {
          const style = doc.createElement('style');
          style.setAttribute('data-local-source', record.file.name);
          style.textContent = inlineCssImports(record.text, byPath, record.path);
          link.replaceWith(style);
        } else if (!/^(https?:)?\/\//i.test(href) && !/^(data:|blob:)/i.test(href)) {
          missingResources.add(href);
          link.remove();
        }
      }

      for (const style of doc.querySelectorAll('style')) {
        if (style.hasAttribute('data-local-source')) continue;
        style.textContent = inlineCssImports(style.textContent || '', byPath, htmlPath);
      }
      for (const element of doc.querySelectorAll('[style]')) {
        element.setAttribute('style', rewriteCssUrls(element.getAttribute('style') || '', byPath, htmlPath));
      }

      const replaceAttr = (selector, attr) => {
        for (const element of doc.querySelectorAll(selector)) {
          const value = element.getAttribute(attr) || '';
          const record = findRecord(byPath, value, htmlPath);
          if (record?.dataUrl) element.setAttribute(attr, record.dataUrl);
          else if (value && !/^(data:|blob:|https?:|\/\/|#)/i.test(value)) missingResources.add(value);
        }
      };
      replaceAttr('img[src], source[src], input[type="image"][src], video[src], audio[src]', 'src');
      replaceAttr('video[poster]', 'poster');
      replaceAttr('svg image[href]', 'href');
      replaceAttr('svg image[xlink\\:href]', 'xlink:href');

      for (const source of doc.querySelectorAll('[srcset]')) {
        const rewritten = (source.getAttribute('srcset') || '')
          .split(',')
          .map((part) => {
            const bits = part.trim().split(/\s+/);
            const record = findRecord(byPath, bits[0], htmlPath);
            if (record?.dataUrl) bits[0] = record.dataUrl;
            else if (bits[0] && !/^(data:|blob:|https?:|\/\/)/i.test(bits[0])) missingResources.add(bits[0]);
            return bits.join(' ');
          })
          .join(', ');
        source.setAttribute('srcset', rewritten);
      }

      // Lazy images and content-visibility commonly leave lower sections empty
      // inside an off-screen importer frame. Force browser layout for the full DOM.
      doc.querySelectorAll('img[loading], iframe[loading]').forEach((element) => element.setAttribute('loading', 'eager'));
      doc.querySelectorAll('img').forEach((element) => element.setAttribute('decoding', 'sync'));
      doc.querySelectorAll('a[href^="javascript:" i], form[action^="javascript:" i]').forEach((node) => {
        node.removeAttribute(node.tagName === 'FORM' ? 'action' : 'href');
      });

      doc.querySelectorAll('meta[name="viewport" i]').forEach((node) => node.remove());
      const meta = doc.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, initial-scale=1, maximum-scale=1';
      doc.head.prepend(meta);

      const viewportStyle = doc.createElement('style');
      viewportStyle.setAttribute('data-html-to-figma-viewport', '');
      viewportStyle.textContent = `
        html{scrollbar-width:none!important}
        html::-webkit-scrollbar,body::-webkit-scrollbar{width:0!important;height:0!important}
        body *{content-visibility:visible!important}
      `;
      doc.head.appendChild(viewportStyle);

      if (missingResources.size) {
        const sample = Array.from(missingResources).slice(0, 4).join(', ');
        currentWarnings.push(`Some local project files were not selected (${sample}${missingResources.size > 4 ? ', …' : ''}). Select the missing referenced files together with the HTML to render every dynamic section.`);
      }
      return doc;
    }

    function waitForLoad(frame) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('HTML took too long to load.')), 10000);
        frame.onload = () => {
          clearTimeout(timeout);
          resolve();
        };
      });
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function runtimeDocumentHeight(doc) {
      return Math.max(
        doc.documentElement?.scrollHeight || 0,
        doc.documentElement?.offsetHeight || 0,
        doc.body?.scrollHeight || 0,
        doc.body?.offsetHeight || 0,
        1,
      );
    }

    async function scrollThroughDocument(frame) {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      if (!doc || !win || !doc.body) return;
      win.dispatchEvent(new Event('resize'));
      await nextFrame();
      let height = runtimeDocumentHeight(doc);
      const step = Math.max(240, Math.floor(win.innerHeight * .72));
      let y = 0;
      let steps = 0;
      while (y <= height && steps < 220) {
        win.scrollTo(0, y);
        win.dispatchEvent(new Event('scroll'));
        doc.dispatchEvent(new Event('scroll', { bubbles:true }));
        await sleep(70);
        await nextFrame();
        height = Math.max(height, runtimeDocumentHeight(doc));
        y += step;
        steps += 1;
      }
      win.scrollTo(0, Math.max(0, height - win.innerHeight));
      win.dispatchEvent(new Event('scroll'));
      await sleep(180);
      await waitForDynamicContent(frame, 9000, 700);
      win.scrollTo(0, 0);
      win.dispatchEvent(new Event('scroll'));
      await nextFrame();
    }

    function settleAnimations(frame) {
      const doc = frame.contentDocument;
      if (!doc) return;
      try {
        for (const animation of doc.getAnimations?.({ subtree:true }) || []) {
          const timing = animation.effect?.getComputedTiming?.();
          if (timing && Number.isFinite(timing.endTime)) animation.finish();
          else animation.pause();
        }
      } catch (_error) {}
      const style = doc.createElement('style');
      style.setAttribute('data-html-to-figma-settled', '');
      style.textContent = '*,*::before,*::after{transition:none!important;scroll-behavior:auto!important}';
      doc.head.appendChild(style);
    }

    async function waitForDynamicContent(frame, timeoutMs = 20000, quietMs = 1200) {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      if (!doc || !win || !doc.body) return;
      let lastMutation = performance.now();
      let mutationCount = 0;
      const observer = new MutationObserver(() => {
        mutationCount += 1;
        lastMutation = performance.now();
      });
      observer.observe(doc.documentElement, { subtree:true, childList:true, characterData:true, attributes:true });
      const started = performance.now();
      try {
        while (performance.now() - started < timeoutMs) {
          await new Promise((resolve) => setTimeout(resolve, 120));
          const ready = doc.readyState === 'complete' || doc.readyState === 'interactive';
          const quiet = performance.now() - lastMutation >= quietMs;
          if (ready && quiet) break;
        }
      } finally {
        observer.disconnect();
      }
      // A final pair of animation frames lets the browser commit layout after
      // the last framework mutation.
      await nextFrame();
      return mutationCount;
    }

    function detectUnrenderedTemplates(doc) {

    }

    function escapeXml(value) {
      return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function captureDocument(render) {
      const clone = render.doc.documentElement.cloneNode(true);
      clone.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
      const serialized = new XMLSerializer().serializeToString(clone);
      const svg = `<?xml version="1.0" encoding="UTF-8"?>\n` +
        `<svg xmlns="http://www.w3.org/2000/svg" width="${render.width}" height="${render.height}" viewBox="0 0 ${render.width} ${render.height}">` +
        `<foreignObject x="0" y="0" width="100%" height="100%">${serialized}</foreignObject></svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      try {
        const image = await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('The browser could not render the HTML as PNG.'));
          img.src = url;
        });
        const scale = Math.min(1, 4096 / render.width, 4096 / render.height);
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(render.width * scale));
        canvas.height = Math.max(1, Math.round(render.height * scale));
        const context = canvas.getContext('2d');
        if (!context) throw new Error('Canvas is unavailable.');
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return await canvasToPngBytes(canvas);
      } finally {
        URL.revokeObjectURL(url);
      }
    }


    function cleanText(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function semanticElementName(element) {
      const tag = element.tagName.toLowerCase();
      const own = Array.from(element.childNodes || []).filter((node) => node.nodeType === Node.TEXT_NODE).map((node) => node.nodeValue || '').join(' ');
      const text = cleanText(own || element.getAttribute('aria-label') || element.getAttribute('title') || '');
      const hint = cleanText(element.getAttribute('data-name') || element.id || Array.from(element.classList || [])[0] || '').replace(/[._-]+/g, ' ');
      const short = (value) => value.length > 64 ? `${value.slice(0,61)}…` : value;
      if (/^h[1-6]$/.test(tag)) return `${tag.toUpperCase()} · ${short(text || hint || 'Heading')}`;
      if (tag === 'a') return `Link · ${short(text || hint || 'Untitled')}`;
      if (tag === 'button') return `Button · ${short(text || hint || 'Untitled')}`;
      if (tag === 'img') return `Image · ${short(element.getAttribute('alt') || hint || 'Untitled')}`;
      const names = { header:'Header', footer:'Footer', nav:'Navigation', main:'Main', section:'Section', article:'Article', form:'Form', ul:'List', ol:'List', li:'Item' };
      if (names[tag]) return `${names[tag]}${hint ? ` · ${short(hint)}` : ''}`;
      if (/(card|tile|project|service|price|pricing)/i.test(`${element.id} ${element.className}`)) return `Card${hint ? ` · ${short(hint)}` : ''}`;
      if (/(hero|banner)/i.test(`${element.id} ${element.className}`)) return `Hero${hint ? ` · ${short(hint)}` : ''}`;
      if (/(grid|row|columns?)/i.test(`${element.id} ${element.className}`)) return `Grid${hint ? ` · ${short(hint)}` : ''}`;
      return hint ? `Container · ${short(hint)}` : 'Container';
    }

    function nodeName(element) { return semanticElementName(element); }

    function groupLineRects(rects) {
      const lines = [];
      for (const rect of rects) {
        const line = lines.find((item) => Math.abs(item.top - rect.top) <= 1.5);
        if (line) {
          line.left = Math.min(line.left, rect.left);
          line.right = Math.max(line.right, rect.right);
          line.bottom = Math.max(line.bottom, rect.bottom);
        } else {
          lines.push({ left:rect.left, right:rect.right, top:rect.top, bottom:rect.bottom });
        }
      }
      return lines.sort((a,b) => a.top - b.top);
    }

    function measureVisualLineTexts(textNode, style, lineRects, doc) {
      const raw = textNode.nodeValue || '';
      const output = lineRects.map(() => '');
      let pendingSpace = false;
      const tokenPattern = /\s+|\S+/gu;
      let match;
      while ((match = tokenPattern.exec(raw))) {
        const token = match[0];
        if (/^\s+$/u.test(token)) {
          pendingSpace = true;
          continue;
        }
        const range = doc.createRange();
        try {
          range.setStart(textNode, match.index);
          range.setEnd(textNode, match.index + token.length);
          const tokenRects = Array.from(range.getClientRects()).filter((rect) => rect.width > .05 && rect.height > .05);
          if (!tokenRects.length) continue;
          const tokenTop = tokenRects[0].top;
          let lineIndex = 0;
          let bestDistance = Infinity;
          for (let index = 0; index < lineRects.length; index += 1) {
            const distance = Math.abs(lineRects[index].top - tokenTop);
            if (distance < bestDistance) { bestDistance = distance; lineIndex = index; }
          }
          if (pendingSpace && output[lineIndex]) output[lineIndex] += ' ';
          output[lineIndex] += token;
          pendingSpace = false;
        } finally {
          range.detach();
        }
      }
      return output
        .map((line) => transformedText(line.trim(), style.textTransform))
        .filter((line) => line.length > 0);
    }

    function serializeTextNode(textNode, parentElement, state) {
      if (state.count >= state.maxNodes) return null;
      const style = state.window.getComputedStyle(parentElement);
      const originalText = normalizeText(textNode.nodeValue || '', style.whiteSpace).trim();
      if (!originalText) return null;
      const range = state.doc.createRange();
      range.selectNodeContents(textNode);
      const rects = Array.from(range.getClientRects()).filter((rect) => rect.width > .05 && rect.height > .05);
      const union = range.getBoundingClientRect();
      range.detach();
      if (!rects.length || union.bottom < 0 || union.top > state.height) return null;

      const lines = groupLineRects(rects);
      const lineTexts = measureVisualLineTexts(textNode, style, lines, state.doc);
      const transformedOriginal = transformedText(originalText, style.textTransform);
      const text = lineTexts.length ? lineTexts.join('\n') : transformedOriginal;
      const minLeft = Math.min(...lines.map((line) => line.left));
      const maxRight = Math.max(...lines.map((line) => line.right));
      const first = lines[0];
      const last = lines[lines.length - 1];
      const safety = Math.min(6, Math.max(1.5, px(style.fontSize,16) * .1));

      state.count += 1;
      return {
        kind:'text', name:transformedOriginal, x:minLeft, y:first.top,
        width:Math.max(1, maxRight-minLeft+safety), height:Math.max(1,last.bottom-first.top),
        text, originalText:transformedOriginal,
        color:parseCssColor(style.color), fontFamily:style.fontFamily || 'Inter', fontSize:px(style.fontSize,16),
        fontWeight:parseInt(style.fontWeight,10) || ({normal:400,bold:700}[style.fontWeight] || 400), italic:style.fontStyle === 'italic' || style.fontStyle === 'oblique',
        letterSpacing:style.letterSpacing === 'normal' ? 0 : px(style.letterSpacing), lineHeight:style.lineHeight === 'normal' ? px(style.fontSize,16)*1.2 : px(style.lineHeight,px(style.fontSize,16)*1.2),
        align:textAlign(style.textAlign), decoration:textDecoration(style), opacity:1,
        resizeMode:'AUTO_WIDTH', lineCount:lines.length, lockedLines:true,
      };
    }

    function serializeControlText(element, style, rect, state) {
      const value = element.value || element.getAttribute('placeholder') || '';
      if (!String(value).trim() || state.count >= state.maxNodes) return null;
      state.count += 1;
      const left = px(style.paddingLeft,4) + px(style.borderLeftWidth,0);
      const right = px(style.paddingRight,4) + px(style.borderRightWidth,0);
      const top = px(style.paddingTop,2) + px(style.borderTopWidth,0);
      return { kind:'text', name:String(value), x:rect.left+left, y:rect.top+top, width:Math.max(1,rect.width-left-right), height:Math.max(1,rect.height-top-px(style.paddingBottom,2)), text:String(value), color:parseCssColor(style.color), fontFamily:style.fontFamily||'Inter', fontSize:px(style.fontSize,16), fontWeight:parseInt(style.fontWeight,10)||400, italic:style.fontStyle==='italic'||style.fontStyle==='oblique', letterSpacing:style.letterSpacing==='normal'?0:px(style.letterSpacing), lineHeight:style.lineHeight==='normal'?px(style.fontSize,16)*1.2:px(style.lineHeight), align:textAlign(style.textAlign), decoration:textDecoration(style), opacity:1, resizeMode:'AUTO_HEIGHT', lineCount:1 };
    }

    function selectedPresets() {
      return Array.from(document.querySelectorAll('input[name="preset"]:checked')).map((input) => ({ width:Number(input.value), label:input.dataset.label }));
    }

    function base64ToBytes(value) {
      const binary = atob(value || '');
      const bytes = new Uint8Array(binary.length);
      for (let index=0; index<binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    function hydrateHelperNodes(nodes) {
      for (const node of nodes || []) {
        if (node.bytesBase64) { node.bytes = base64ToBytes(node.bytesBase64); delete node.bytesBase64; }
        if (node.backgroundImageBase64) { node.backgroundImageBytes = base64ToBytes(node.backgroundImageBase64); delete node.backgroundImageBase64; }
        if (node.kind === 'frame') hydrateHelperNodes(node.children || []);
      }
      return nodes || [];
    }

    function flattenTechnicalFrames(nodes) {
      const result = [];
      for (const node of nodes || []) {
        if (node.kind === 'frame') {
          node.children = flattenTechnicalFrames(node.children || []);
          const backgroundAlpha = node.background?.a || 0;
          const visual = backgroundAlpha > 0 || (node.borderWidth || 0) > 0 || node.shadow || node.backgroundImageBytes || node.gradient || node.clipsContent || (node.opacity ?? 1) < .999;
          if (!visual && node.name === 'Container') { result.push(...node.children); continue; }
        }
        result.push(node);
      }
      return result;
    }

    async function fetchJson(url, options = {}, timeoutMs = 120000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, { ...options, signal:controller.signal });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok === false) throw new Error(payload.error || `HTTP ${response.status}`);
        return payload;
      } finally { clearTimeout(timeout); }
    }

    async function checkHelper() {
      helperState.textContent = 'Checking the Render server…';
      helperState.className = 'helper-state muted';
      try {
        const origin = getServerOrigin();
        serverUrlInput.value = origin;
        try { localStorage.setItem('html-to-figma-server-url', origin); } catch (_error) {}
        const result = await fetchJson(`${origin}/health`, { headers:{ 'X-API-Key':getServerKey() } }, 45000);
        const ready = result.ok !== false && result.browserReady !== false;
        helperState.textContent = ready ? 'Server is online and Chromium is ready.' : 'Server responded, but Chromium is not ready.';
        helperState.className = `helper-state ${ready ? 'success' : 'error'}`;
        return ready;
      } catch (error) {
        helperState.textContent = `Connection failed: ${error instanceof Error ? error.message : String(error)}`;
        helperState.className = 'helper-state error';
        return false;
      }
    }

    function postToFigma(message) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          if (figmaWaiter?.reject === reject) figmaWaiter = null;
          reject(new Error('Figma took too long to create the layers.'));
        }, 300000);
        figmaWaiter = {
          resolve:(value) => { clearTimeout(timeout); figmaWaiter = null; resolve(value); },
          reject:(error) => { clearTimeout(timeout); figmaWaiter = null; reject(error); },
        };
        parent.postMessage({ pluginMessage:message }, '*');
      });
    }

    async function importUrlPreset(url, preset, options, batch) {
      const origin = getServerOrigin();
      setStatus(`Opening the website in Chromium: ${preset.label}…`, 'normal', 8 + batch.index / batch.total * 42);
      const result = await fetchJson(`${origin}/render`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'X-API-Key':getServerKey() },
        body:JSON.stringify({ url, width:preset.width }),
      }, 300000);
      currentWarnings.push(...(result.warnings || []));
      if (!result.html) throw new Error('The server returned an empty page.');

      setStatus(`Preparing editable layers: ${preset.label}…`, 'normal', 46 + batch.index / batch.total * 28);
      const parsed = new DOMParser().parseFromString(result.html, 'text/html');
      const render = await createRenderFrame(parsed, preset.width);
      const serialized = await serializeDocument(render, options.maxNodes);
      currentWarnings.push(...serialized.warnings);
      await postToFigma({
        type:'import-editable',
        sourceName:result.sourceName || result.title || new URL(url).hostname,
        width:render.width,
        height:render.height,
        rootStyle:{ background:serialized.background },
        children:serialized.children,
        batch,
        uiWarnings:[...(result.warnings || []), ...serialized.warnings],
      });
      cleanupRenderFrame();
    }

    async function importLocalPreset(prepared, htmlFile, htmlText, preset, options, batch) {
      setStatus(`Rendering local HTML: ${preset.label}…`, 'normal', 8 + batch.index / batch.total * 70);
      const htmlRecord = prepared.records.find((record) => record.file === htmlFile);
      const sanitized = sanitizeAndInline(htmlText, prepared.byPath, prepared.records, htmlRecord?.path || htmlFile.name);
      const render = await createRenderFrame(sanitized, preset.width);
      if (options.mode === 'screenshot') {
        const bytes = await captureDocument(render);
        await postToFigma({ type:'import-screenshot', sourceName:htmlFile.name, width:render.width, height:render.height, tiles:[{x:0,y:0,width:render.width,height:render.height,bytes}], batch });
      } else {
        const result = await serializeDocument(render, options.maxNodes);
        const children = result.children;
        currentWarnings.push(...result.warnings);
        await postToFigma({ type:'import-editable', sourceName:htmlFile.name, width:render.width, height:render.height, rootStyle:{background:result.background}, children, batch, uiWarnings:result.warnings });
      }
      cleanupRenderFrame();
    }

    async function runImport() {
      const presets = selectedPresets();
      if (!presets.length) { setStatus('Select at least one viewport size.', 'error', 0); return; }
      const options = {
        mode:'editable',
        maxNodes:100000,
        cleanTree:false,
      };
      let prepared = null;
      let htmlFile = null;
      let htmlText = '';
      let url = '';
      if (sourceMode === 'local') {
        htmlFile = selectedFiles.find((file) => /\.html?$/i.test(file.name));
        if (!htmlFile) { setStatus('Select an .html or .htm file.', 'error', 0); return; }
      } else {
        try { url = new URL(siteUrlInput.value.trim()).href; }
        catch (_error) { setStatus('Enter a complete URL, such as https://example.com.', 'error', 0); return; }
        if (!/^https?:/i.test(url)) { setStatus('Only http:// and https:// URLs are allowed.', 'error', 0); return; }
      }

      setBusy(true);
      currentWarnings = [];
      const batchId = `batch-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      try {
        if (sourceMode === 'url') {
          const ready = await checkHelper();
          if (!ready) throw new Error('The Render server is not ready. Check its address and wait until the service is Live.');
        } else {
          setStatus('Reading local files…','normal',3);
          prepared = await prepareFiles(selectedFiles);
          const htmlRecord = prepared.records.find((record) => record.file === htmlFile);
          htmlText = htmlRecord?.text || '';
          if (!htmlText) throw new Error('The HTML file is empty or unreadable.');
        }

        for (let index=0; index<presets.length; index += 1) {
          const preset = presets[index];
          const batch = { id:batchId, index, total:presets.length, presetLabel:preset.label };
          if (sourceMode === 'url') await importUrlPreset(url,preset,options,batch);
          else await importLocalPreset(prepared,htmlFile,htmlText,preset,options,batch);
        }
        const uniqueWarnings = [...new Set(currentWarnings.filter(Boolean))];
        const suffix = uniqueWarnings.length ? `\n\nWarnings:\n• ${uniqueWarnings.join('\n• ')}` : '';
        setStatus(`Done: imported ${presets.length} version(s).${suffix}`, uniqueWarnings.length ? 'normal' : 'success', 100);
      } catch (error) {
        setStatus(error instanceof Error ? error.message : String(error), 'error', 0);
      } finally {
        setBusy(false);
        cleanupRenderFrame();
      }
    }

    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (!message) return;
      if (message.type === 'progress') {
        const percent = message.total ? 72 + (message.done/message.total)*20 : 80;
        setStatus(`Creating Figma layers: ${message.done} / ${message.total}`, 'normal', percent);
      } else if (message.type === 'complete') {
        currentWarnings.push(...(message.warnings || []));
        figmaWaiter?.resolve(message);
      } else if (message.type === 'error') {
        figmaWaiter?.reject(new Error(message.message || 'Import failed.'));
      }
    };

    try { serverUrlInput.value = localStorage.getItem('html-to-figma-server-url') || ''; } catch (_error) {}
    try { serverKeyInput.value = localStorage.getItem('html-to-figma-server-key') || ''; } catch (_error) {}
    setSourceMode('url');
    updateModeUi();
  </script>
</body>
</html>
