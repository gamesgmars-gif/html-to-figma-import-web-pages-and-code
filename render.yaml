services:
  - type: web
    name: html-to-figma-render-server
    runtime: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT_RENDERS
        value: "1"
      - key: API_KEY
        generateValue: true
